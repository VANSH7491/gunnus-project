[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
filterwarnings =
    # Pydantic v2 emits these inside Motor's bson handling; not our code
    ignore::pydantic.PydanticDeprecatedSince20
    # Starlette's lifespan handler in some httpx versions
    ignore:.*on_event is deprecated.*:DeprecationWarning
